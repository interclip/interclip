# The dev container owns Apache, MySQL, Redis, dependency installation, and its
# readiness checks. These optional services only provide live asset rebuilding.
services:
  sass-watcher:
    name: Sass Watcher
    description: Watch and compile SCSS files.
    commands:
      start: yarn compile:styles --watch

  ts-watcher:
    name: TypeScript Watcher
    description: Watch and bundle TypeScript and JavaScript files.
    commands:
      start: yarn dev
