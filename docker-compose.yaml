services:
  mysql:
    image: mysql:8.0
    container_name: iclip_mysql
    restart: unless-stopped
    command: ["--event-scheduler=ON"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in the Compose environment}
      MYSQL_DATABASE: ${DB_NAME:?Set DB_NAME in the Compose environment}
      MYSQL_USER: ${USERNAME:?Set USERNAME in the Compose environment}
      MYSQL_PASSWORD: ${PASSWORD:?Set PASSWORD in the Compose environment}
    volumes:
      - ./scripts/db.sql:/docker-entrypoint-initdb.d/db.sql:ro
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - iclip_network

  redis:
    image: redis:alpine
    container_name: iclip_redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}",
      ]
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - iclip_network

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: iclip_pma
    restart: unless-stopped
    profiles: ["admin"]
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${PMA_USER:?Set PMA_USER in the Compose environment}
      PMA_PASSWORD: ${PMA_PASSWORD:?Set PMA_PASSWORD in the Compose environment}
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - iclip_network

networks:
  iclip_network:
    driver: bridge

volumes:
  mysql_data:
