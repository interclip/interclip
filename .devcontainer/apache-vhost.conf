ServerName localhost
ServerSignature Off
ServerTokens Prod
TraceEnable Off

<VirtualHost *:8080>
    DocumentRoot /workspaces/interclip
    DirectoryIndex router.php

    <Directory /workspaces/interclip>
        AllowOverride All
        Options +FollowSymLinks -Indexes
        Require all granted
    </Directory>

    # Request targets contain bearer clip codes, so paths and queries are omitted.
    LogFormat "%a %l %u %t \"%m %H\" %>s %b" interclip_safe
    CustomLog /proc/self/fd/1 interclip_safe
    ErrorLog /proc/self/fd/2
</VirtualHost>
